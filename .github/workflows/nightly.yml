name: Nightly Build

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  check-nightly:
    name: Check for new commits
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.guard.outputs.should_run }}
      reason: ${{ steps.guard.outputs.reason }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Check latest nightly tag
        id: guard
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" != "schedule" ]]; then
            echo "should_run=true" >> "${GITHUB_OUTPUT}"
            echo "reason=manual run requested" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          latest_tag="$(git for-each-ref --count=1 --sort=-creatordate --format='%(refname:short)' 'refs/tags/nightly-*')"

          if [[ -z "${latest_tag}" ]]; then
            echo "should_run=true" >> "${GITHUB_OUTPUT}"
            echo "reason=no previous nightly tag found" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          latest_sha="$(git rev-list -n 1 "${latest_tag}")"

          if [[ "${latest_sha}" == "${GITHUB_SHA}" ]]; then
            echo "should_run=false" >> "${GITHUB_OUTPUT}"
            echo "reason=${GITHUB_SHA} already has ${latest_tag}" >> "${GITHUB_OUTPUT}"
          else
            echo "should_run=true" >> "${GITHUB_OUTPUT}"
            echo "reason=new commit detected since ${latest_tag}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Report decision
        run: echo "${{ steps.guard.outputs.reason }}"

  build:
    name: Build ${{ matrix.name }}
    needs: check-nightly
    if: ${{ needs.check-nightly.outputs.should_run == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            artifact: fragile-notepad-windows-x64
            archive: fragile-notepad-windows-x64.zip
          - name: linux-x64
            os: ubuntu-latest
            artifact: fragile-notepad-linux-x64
            archive: fragile-notepad-linux-x64.tar.gz
          - name: macos
            os: macos-latest
            artifact: fragile-notepad-macos
            archive: fragile-notepad-macos.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python asset tooling
        run: python -m pip install Pillow

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'patches/**') }}
          restore-keys: |
            ${{ runner.os }}-release-
            ${{ runner.os }}-cargo-

      - name: Install Linux windowing dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            pkg-config

      - name: Apply vendor patches
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\setup-vendor.ps1 apply

      - name: Apply vendor patches
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/setup-vendor.sh apply

      - name: Generate embedded icon assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\generate_icon_assets.ps1

      - name: Generate embedded icon assets
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/generate_icon_assets.sh

      - name: Build release
        run: cargo build --release

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path target\release\fragile-notepad.exe -DestinationPath dist\${{ matrix.archive }} -Force

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/package
          cp target/release/fragile-notepad dist/package/
          tar -C dist/package -czf "dist/${{ matrix.archive }}" fragile-notepad

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish prerelease
    runs-on: ubuntu-latest
    needs:
      - check-nightly
      - build
    if: ${{ needs.check-nightly.outputs.should_run == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="nightly-$(date -u +%Y%m%d)-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          title="Nightly Build $(date -u +%Y-%m-%d)"
          notes="$(cat <<EOF
          Automated nightly build from ${GITHUB_SHA}.

          Artifacts:
          - Windows x64 zip
          - Linux x64 tar.gz
          - macOS tar.gz
          EOF
          )"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${tag}" "${GITHUB_SHA}"
          git push origin "refs/tags/${tag}"

          gh release create "${tag}" dist/* \
            --title "${title}" \
            --notes "${notes}" \
            --prerelease \
            --latest=false
